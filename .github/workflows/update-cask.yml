name: Update kdeconnect cask

on:
  schedule:
    - cron: '37 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new build and update cask
        id: update
        run: ./.github/scripts/update-cask.sh

      - name: Commit and push
        if: steps.update.outputs.updated == 'true'
        env:
          NEW_VERSION: ${{ steps.update.outputs.new_version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/kdeconnect.rb
          git commit -m "Bump kdeconnect to $NEW_VERSION"
          git push
